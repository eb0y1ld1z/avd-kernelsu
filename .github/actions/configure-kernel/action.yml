name: 'Configure Kernel Options'
description: 'CFI permissive (safety net) + KPM; virtio stays as modules (ramdisk injection handles it)'

inputs:
  kernel_version:
    description: 'Kernel version (e.g., 6.6)'
    required: true

runs:
  using: composite
  steps:
    - name: Create GKI fragment (CFI permissive + KPM)
      shell: bash
      run: |
        FRAG="${{ github.workspace }}/gki.fragment"
        KERNEL_SRC="${{ github.workspace }}/kernel/common"
        echo "# 6.6.30 build: CFI stock modullerle eslesir; permissive guvenlik agi" > "$FRAG"
        # virtio'yu =y ZORLAMIYORUZ (modul kalir; ramdisk-injection + fstab yontemimiz hallediyor)
        for cfg in CONFIG_CFI_PERMISSIVE CONFIG_KPM; do
          SYM="${cfg#CONFIG_}"
          if grep -rq "^config $SYM\$" "$KERNEL_SRC" 2>/dev/null; then
            echo "${cfg}=y" >> "$FRAG"
            echo "  Added: ${cfg}=y"
          else
            echo "  Skipped (not in Kconfig): ${cfg}"
          fi
        done
        echo "=== Final GKI Fragment ==="; cat "$FRAG"
        for dir in "$KERNEL_SRC/arch/x86/configs" "$KERNEL_SRC/arch/arm64/configs"; do
          [ -d "$dir" ] && cp "$FRAG" "$dir/gki.fragment"
        done
