name: 'Configure Kernel Options'
description: 'AVD compatibility: keep virtio as modules (no forced built-ins)'

inputs:
  kernel_version:
    description: 'Kernel version (e.g., 6.6)'
    required: true

runs:
  using: composite
  steps:
    - name: Create empty GKI fragment (virtio stays as modules)
      shell: bash
      run: |
        FRAG="${{ github.workspace }}/gki.fragment"
        KERNEL_SRC="${{ github.workspace }}/kernel/common"
        # virtio'yu =y zorlamiyoruz; GKI default'unda =m kalir, .ko uretilir,
        # install-ksu-avd.sh ramdisk'i eslesen vermagic ile repack eder.
        echo "# intentionally empty: build virtio as modules" > "$FRAG"
        for dir in "$KERNEL_SRC/arch/x86/configs" "$KERNEL_SRC/arch/arm64/configs"; do
          [ -d "$dir" ] && cp "$FRAG" "$dir/gki.fragment"
        done
